<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Did Mac get laid off today?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      transition: background 1.5s ease;
    }

    body.dark {
      background: #111;
    }

    #question {
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      text-align: center;
      padding: 0 2rem;
      line-height: 1.4;
      transition: opacity 0.4s ease;
    }

    #countdown {
      font-size: clamp(4rem, 18vw, 12rem);
      font-weight: bold;
      margin-top: 1.5rem;
      line-height: 1;
      transition: opacity 0.3s ease, color 0.5s ease;
    }

    #result {
      font-size: clamp(6rem, 30vw, 18rem);
      font-weight: bold;
      color: #c0392b;
      opacity: 0;
      transform: scale(0.3);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
      display: none;
      text-shadow: 0 0 40px rgba(192, 57, 43, 0.6);
    }

    #result.show {
      opacity: 1;
      transform: scale(1);
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="question">Did Mac get laid off today?</div>
  <div id="countdown">5</div>
  <div id="result">YES</div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const question = document.getElementById('question');
    const countdownEl = document.getElementById('countdown');
    const result = document.getElementById('result');

    let count = 5;
    let particles = [];

    // Turn countdown red in the last 3 seconds
    const interval = setInterval(() => {
      count--;
      if (count > 0) {
        countdownEl.textContent = count;
        if (count <= 3) {
          countdownEl.style.color = '#c0392b';
        }
      } else {
        clearInterval(interval);
        triggerExplosion();
      }
    }, 1000);

    function triggerExplosion() {
      question.style.opacity = '0';
      countdownEl.style.opacity = '0';
      document.body.classList.add('dark');

      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      // Flash
      const flash = document.createElement('div');
      Object.assign(flash.style, {
        position: 'fixed', inset: '0',
        background: 'white',
        zIndex: '9',
        opacity: '0.9',
        transition: 'opacity 0.4s ease',
        pointerEvents: 'none'
      });
      document.body.appendChild(flash);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { flash.style.opacity = '0'; });
      });
      setTimeout(() => flash.remove(), 600);

      // Particles — reds, oranges, blacks, embers
      const colors = ['#e74c3c', '#c0392b', '#e67e22', '#f39c12', '#ecf0f1', '#7f8c8d', '#ff6b6b', '#ff0000'];
      for (let i = 0; i < 300; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 20 + 3;
        const size = Math.random() * 10 + 2;
        const shape = Math.random() < 0.6 ? 'circle' : 'rect';
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - Math.random() * 8,
          life: 1,
          decay: Math.random() * 0.014 + 0.007,
          color: colors[Math.floor(Math.random() * colors.length)],
          size,
          shape,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.35,
          gravity: 0.4
        });
      }

      requestAnimationFrame(animate);

      setTimeout(() => {
        question.style.display = 'none';
        countdownEl.style.display = 'none';
        result.style.display = 'block';
        requestAnimationFrame(() => result.classList.add('show'));
      }, 900);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles = particles.filter(p => p.life > 0);

      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);

        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.5);
        }

        ctx.restore();

        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.98;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;
      }

      if (particles.length > 0) {
        requestAnimationFrame(animate);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
  </script>
</body>
</html>
